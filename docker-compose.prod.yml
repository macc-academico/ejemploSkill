services:
  agent-example-skill:
    container_name: agent-example-skill
    image: macc180794/agent-example-skill:latest
    expose:
      - "8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    networks:
      - nginx_proxy_network

networks:
  nginx_proxy_network:
    external: true
