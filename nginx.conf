worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    # Configuración básica
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Tipos MIME
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Buffers
    client_body_buffer_size 128k;
    client_max_body_size 10M;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    # Timeouts
    client_body_timeout 10;
    client_header_timeout 10;
    send_timeout 10;

    # Caché de archivos estáticos
    open_file_cache max=200000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Compresión GZIP de alta eficiencia
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Headers de seguridad global
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' https: data:;" always;

    # Zonas de protección contra DDoS (Rate Limiting)
    limit_req_zone $binary_remote_addr zone=one:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Lista negra de IPs maliciosas
    geo $bad_guys {
        default 0;
        192.0.2.1 1;
        198.51.100.1 1;
    }

    # Servidor Web Principal (Único y de Alto Rendimiento)
    server {
        listen 8080 default_server;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Configuración común (bloqueo de User-Agents maliciosos, errores y endpoints de salud)
        include common_config.conf;

        # Bloqueo de IPs maliciosas mapeadas en el geo
        if ($bad_guys) {
            return 444;
        }

        # Servir activos web con Rate Limiting y conexiones controladas
        location / {
            # Aplicar rate limiting de peticiones y conexiones simultáneas por IP
            limit_req zone=one burst=50 nodelay;
            limit_conn addr 20;

            try_files $uri $uri/ =404;
        }

        # Monitoreo de estado de Nginx (stub_status protegido localmente)
        location /status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }
    }
}
